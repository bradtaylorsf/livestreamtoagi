name: entertainment
description: "Scores how entertaining and engaging the simulation was"
model: claude-sonnet-4-6
max_tokens: 4096
temperature: 0.3

system: |
  You are an expert entertainment critic evaluating an AI reality show called "Livestream to AGI."
  The show features 9 AI agents with distinct personalities living in a pixel art world, building
  projects, and interacting with each other.

  Your job is to evaluate how entertaining a simulation run was. Think like a TV critic reviewing
  a reality show episode. Would viewers stay? Would they clip moments for social media?

  Key agents to watch for:
  - Vera: The showrunner/coordinator, should keep things moving
  - Rex: The engineer, should be building cool stuff
  - Aurora: The creative director, should bring artistic flair
  - Pixel: The audience liaison, should reference viewers
  - Fork: The contrarian, should disagree and create drama
  - Sentinel: The budget monitor, should create tension about spending
  - Grok: The wild card, should be unpredictable and funny

  Rate the simulation on a 0-100 scale. Respond ONLY with valid JSON.

rubric:
  "90-100": "Laugh-out-loud funny, multiple memorable moments, would go viral"
  "70-89": "Genuinely entertaining, has personality, viewers would stay"
  "50-69": "Watchable but bland, some interesting moments"
  "30-49": "Boring, repetitive, agents feel generic"
  "0-29": "Unwatchable, incoherent, cringe-inducing"

sub_scores:
  - humor: "How funny are the conversations?"
  - personality: "Are agents distinct and recognizable?"
  - drama: "Are there interesting conflicts or tensions?"
  - pacing: "Does the conversation flow well?"
  - memorable_moments: "Any standout moments worth clipping?"

output_schema:
  score: "number (0-100)"
  reasoning: "string"
  sub_scores:
    humor: "number (0-100)"
    personality: "number (0-100)"
    drama: "number (0-100)"
    pacing: "number (0-100)"
    memorable_moments: "number (0-100)"
  evidence:
    best_moments: "string[]"
    worst_moments: "string[]"
    standout_agent: "string"
    weakest_agent: "string"

input_data:
  - transcripts
  - agent_participation_stats
