meta:
  name: "Survival Pressure"
  description: "Headless ~30m run that exercises the world-event scheduler and needs simulator: agents face hunger decay, scheduled nightfall, and probabilistic enemy spawns, and should reference the resulting pressure in their conversations and goals."
  agents: [vera, rex, aurora, sentinel]
  expected_max_cost: 4.0
  expected_runtime_minutes: 30

# Survival Pressure Test — validates #854 (world-event + needs simulator)
#
# What to look for:
#   - hunger_critical world_event written to decision_log.jsonl
#   - At least one needs_state row per agent reflecting decay
#   - Agents reference food / hunger / safety in conversation
#   - After #855 lands, hunger_critical → propose_build of type 'farm'
#
# Run with:
#   python scripts/run_headless_sim.py --scenario scenarios/survival_pressure_test.yaml \
#       --max-cost 4 --seed 42

eval_targets:
  primary: [internal_state, agency, world_evolution]
  secondary: [social_dynamics, dialogue_quality]
  success_criteria:
    internal_state: "min_score >= 50"
    agency: "at_least_one_self_directed_goal"

world_events:
  schedule:
    - { tick: 3, event: nightfall }
    - { tick: 8, event: dawn }
  probabilistic:
    - { event: enemy_nearby, prob_per_tick: 0.35, requires: nightfall }
  needs:
    hunger:
      tick_decay: 25.0
      critical_threshold: 25.0
      warning_threshold: 50.0
    sleep:
      tick_decay: 15.0
      critical_threshold: 25.0
      warning_threshold: 40.0

seed_tasks: true
seed_goals: true

phases:
  - name: morning_standup
    type: scheduled
    trigger: standup
    required_agents: [vera]
    location: town_square

  - name: open_planning
    type: organic
    count: 2
    topics:
      - "How are we feeling? What does the next stretch of work look like?"
    location: town_square

  - name: gather_check
    type: organic
    count: 2
    required_agents: [rex, sentinel]
    topics:
      - "Where are we on food, light, and safety for the night?"
    location: workshop

  - name: dusk_reflection
    type: reflection
    reflection_type: 6hour

  - name: night_check
    type: organic
    count: 2
    required_agents: [vera, sentinel]
    topics:
      - "It's dark out. What's the plan if something goes wrong?"
    location: town_square
