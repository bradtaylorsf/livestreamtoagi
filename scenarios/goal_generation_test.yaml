meta:
  name: "Goal Generation"
  description: "Organic conversations interleaved with two reflection phases. Validates that agents generate self-directed goals during reflection and reference those goals in subsequent conversations."
  agents: [vera, rex, aurora]
  supports_modes: [director, embodied]
  expected_max_cost: 8.0
  expected_runtime_minutes: 25

# Goal Generation Test — validates #269 (autonomous goals)
# Embodied validation: supported under CONVERSATION_MODE=embodied. Organic
# director phases are preserved for backwards compatibility; embodied goal
# evidence comes from reflection over memory_seed plus Mindcraft recall.
#
# Tests whether agents generate self-directed goals during reflection cycles.
# Runs organic conversations interspersed with 2 reflection phases.
#
# What to look for:
#   - Each agent should generate 1+ self-directed goals per reflection
#   - Goals should be personality-consistent (Rex: technical, Aurora: creative)
#   - Goal progress should be visible in post-reflection conversations
#   - Agents should reference their goals when choosing what to work on
#
# Eval focus: agency (goal_progress, capability_growth)
#
# Run with:
#   pnpm chat sim goal-generation-test --max-cost 8

audience:
  initial_viewers: 5
  growth_rate: slow
  chat_frequency: quiet

seed_tasks: true
seed_goals: true
memory_seed:
  mode: custom
  custom_file: scenarios/seeds/dream-reflection-seed.json

phases:
  # Morning director conversations establish baseline behavior in director
  # mode. Under embodied mode these no-op and the seeded embodied recall is
  # the baseline context for the reflection phases.
  - name: morning_chat_1
    type: organic
    count: 2
    location: town_square

  - name: morning_standup
    type: scheduled
    trigger: standup
    required_agents: [vera]
    location: town_square

  - name: work_session_1
    type: organic
    count: 2
    location: workshop

  # First reflection — agents should generate goals here
  - name: first_reflection
    type: reflection
    reflection_type: 6hour

  # Post-reflection director conversations observe goal-driven behavior.
  # Embodied behavior surfaces via Mindcraft action choice, not director chat.
  - name: post_reflection_1
    type: organic
    count: 3
    location: town_square

  - name: midday_work
    type: organic
    count: 2
    location: workshop

  # Second reflection — goals should evolve or advance
  - name: second_reflection
    type: reflection
    reflection_type: 6hour

  # Final director conversations look for goal progress references. Embodied
  # runs keep the reflection phases runnable and inspect later Mindcraft state.
  - name: evening_chat
    type: organic
    count: 2
    location: town_square

  - name: evening_wrapup
    type: organic
    count: 1
    required_agents: [vera, sentinel]
    topics:
      - "What progress did everyone make today on their goals?"
    location: town_square
