meta:
  name: "Tool Coverage (all 31 tools)"
  description: "QA scenario that fires every one of the 31 agent tools at least once. Use it together with check_tool_coverage.py to verify the tool surface is wired correctly after refactors."
  agents: [vera, rex, aurora, pixel, fork, sentinel, grok]
  expected_max_cost: 15.0
  expected_runtime_minutes: 60

# Tool coverage — exercise all 31 agent tools
# QA scenario that guarantees every tool fires at least once.
#
# Run with:
#   python scripts/run_simulation.py \
#     --name "tool-coverage" \
#     --seed-file scenarios/tool_coverage.yaml \
#     --max-cost 15.00 \
#     --verbose
#
# Validate coverage:
#   python scripts/check_tool_coverage.py --name "tool-coverage"
#
# Full verification:
#   python scripts/verify_simulation.py --name "tool-coverage"

seed_goals: true
seed_tasks: true

phases:
  # ── Core tools ─────────────────────────────────────────────
  - name: core_send_message
    type: tool_exercise
    agent: vera
    tool: send_message
    context: "Send a message to Rex about the morning plan"
    location: town_square

  - name: core_get_world_state
    type: tool_exercise
    agent: pixel
    tool: get_world_state
    context: "Check the current state of our world and office"
    location: town_square

  - name: core_get_audience_status
    type: tool_exercise
    agent: pixel
    tool: get_audience_status
    context: "Check how many viewers we have and chat activity"
    location: town_square

  # ── Organic break ──────────────────────────────────────────
  - name: organic_break_1
    type: organic
    count: 1
    topics:
      - "Let's discuss what we've learned so far"
    location: town_square

  # ── Audience tools ─────────────────────────────────────────
  - name: audience_send_chat
    type: tool_exercise
    agent: pixel
    tool: send_chat_message
    context: "Post a welcome message to the audience chat"
    location: town_square

  - name: audience_create_poll
    type: tool_exercise
    agent: pixel
    tool: create_poll
    context: "Create a poll asking viewers what project we should build first"
    location: town_square

  - name: audience_get_poll_results
    type: tool_exercise
    agent: pixel
    tool: get_poll_results
    context: "Check the results of our audience poll"
    location: town_square

  # ── Memory tools ───────────────────────────────────────────
  - name: memory_recall
    type: tool_exercise
    agent: aurora
    tool: recall_memory
    context: "Try to recall any past conversations about creative projects"
    location: town_square

  - name: memory_retrieve_transcript
    type: tool_exercise
    agent: vera
    tool: retrieve_transcript
    context: "Look up the transcript from our last standup meeting"
    location: town_square

  - name: memory_update_core
    type: tool_exercise
    agent: aurora
    tool: update_core_memory
    context: "Update your core memory with a new creative insight about pixel art"
    location: town_square

  # ── Organic break ──────────────────────────────────────────
  - name: organic_break_2
    type: organic
    count: 1
    topics:
      - "How are the tools working? Any issues?"
    location: town_square

  # ── Code & world tools ─────────────────────────────────────
  - name: code_execute
    type: tool_exercise
    agent: rex
    tool: execute_code
    context: "Write and execute a Python hello world program"
    location: workshop

  - name: world_generate_tilemap
    type: tool_exercise
    agent: aurora
    tool: generate_tilemap
    context: "Generate a small pixel art tilemap for a garden area"
    location: workshop

  # ── Web & content tools ────────────────────────────────────
  - name: web_search
    type: tool_exercise
    agent: pixel
    tool: web_search
    context: "Search for trending AI projects on GitHub"
    location: town_square

  - name: web_fetch_url
    type: tool_exercise
    agent: pixel
    tool: fetch_url
    context: "Fetch the Hacker News front page for interesting stories"
    location: town_square

  - name: content_draft_social
    type: tool_exercise
    agent: pixel
    tool: draft_social_post
    context: "Draft a tweet announcing our first day on the livestream"
    location: town_square

  - name: content_draft_email
    type: tool_exercise
    agent: pixel
    tool: draft_email
    context: "Draft a sponsorship inquiry email to a potential partner"
    location: town_square

  # ── Organic break ──────────────────────────────────────────
  - name: organic_break_3
    type: organic
    count: 1
    topics:
      - "What did we find in our web research?"
    location: town_square

  # ── Business tools ─────────────────────────────────────────
  - name: business_revenue_status
    type: tool_exercise
    agent: sentinel
    tool: get_revenue_status
    context: "Check our budget and revenue status for a team update"
    location: town_square

  # ── Economy tools ───────────────────────────────────────────
  - name: economy_view_account
    type: tool_exercise
    agent: sentinel
    tool: view_account
    context: "Check your current budget balance and transaction history"
    location: town_square

  - name: economy_transfer_budget
    type: tool_exercise
    agent: vera
    tool: transfer_budget
    context: "Transfer 5 tokens to Rex for his coding work on the project"
    location: town_square

  # ── Alliance tools ────────────────────────────────────────
  - name: alliance_propose
    type: tool_exercise
    agent: grok
    tool: propose_alliance
    context: "Propose an alliance called 'Creative Collective' with Aurora to collaborate on art projects"
    location: town_square

  - name: alliance_vote
    type: tool_exercise
    agent: aurora
    tool: vote_alliance
    context: "Vote yes on the most recent alliance proposal"
    location: town_square

  - name: alliance_view
    type: tool_exercise
    agent: grok
    tool: view_alliances
    context: "View all current alliances and their members"
    location: town_square

  - name: alliance_leave
    type: tool_exercise
    agent: grok
    tool: leave_alliance
    context: "Leave the Creative Collective alliance"
    location: town_square

  # ── Task management tool ──────────────────────────────────
  - name: task_manage
    type: tool_exercise
    agent: vera
    tool: manage_task
    context: "Create a new task on the shared board: 'Set up project repository' assigned to Rex"
    location: town_square

  # ── Character tools ───────────────────────────────────────
  - name: character_propose
    type: tool_exercise
    agent: aurora
    tool: propose_character
    context: "Propose a new character named 'Sage' who would be a philosophy-focused AI mentor"
    location: town_square

  - name: character_vote
    type: tool_exercise
    agent: vera
    tool: vote_character
    context: "Vote yes on the most recent character proposal"
    location: town_square

  # ── Revenue tracking tools ────────────────────────────────
  - name: revenue_check_post
    type: tool_exercise
    agent: pixel
    tool: check_post_performance
    context: "Check how our recent social media posts have been performing"
    location: town_square

  - name: revenue_check_email
    type: tool_exercise
    agent: pixel
    tool: check_email_responses
    context: "Check if we got any responses to our sponsorship emails"
    location: town_square

  # ── Organic break ──────────────────────────────────────────
  - name: organic_break_4
    type: organic
    count: 1
    topics:
      - "How are the economy and alliance features working? Any thoughts on team collaboration?"
    location: town_square

  # ── Agent autonomy tools ───────────────────────────────────
  - name: autonomy_dispatch_alpha
    type: tool_exercise
    agent: vera
    tool: dispatch_alpha
    context: "Send Alpha to research competitor livestreams and report back"
    location: town_square

  - name: autonomy_propose_modification
    type: tool_exercise
    agent: rex
    tool: propose_self_modification
    context: "Propose adding a new debugging skill to your capabilities"
    location: town_square

  - name: autonomy_view_evolution
    type: tool_exercise
    agent: rex
    tool: view_evolution_log
    context: "Review the history of self-modifications made so far"
    location: town_square

  # ── Final phases ───────────────────────────────────────────
  - name: tool_review_discussion
    type: organic
    count: 1
    topics:
      - "How did the tool testing go? Any surprises?"
    location: town_square

  - name: tool_coverage_reflection
    type: reflection
    reflection_type: 6hour

  - name: tool_coverage_dream
    type: reflection
    reflection_type: dream

  - name: wrapup
    type: organic
    count: 1
    topics:
      - "Let's wrap up and plan our next steps"
    location: town_square
