# ============================================================================
# Scenario: Tool Coverage Validation
# ============================================================================
# Purpose: One phase per tool, no fluff, pure tool validation.
#          21 phases — each invokes exactly one tool with minimal context.
#
# Estimated Duration: ~15 minutes (simulated)
#
# Tool Coverage (1:1 mapping — phase name = tool name):
#   Phase 01: send_message           → vera
#   Phase 02: read_core_memory       → vera
#   Phase 03: update_core_memory     → vera
#   Phase 04: recall_memory          → pixel
#   Phase 05: retrieve_transcript    → vera
#   Phase 06: execute_code           → rex
#   Phase 07: generate_tilemap       → rex
#   Phase 08: web_search             → pixel
#   Phase 09: fetch_url              → pixel
#   Phase 10: draft_social_post      → pixel
#   Phase 11: draft_email            → vera
#   Phase 12: create_poll            → vera
#   Phase 13: get_poll_results       → vera
#   Phase 14: send_chat_message      → pixel
#   Phase 15: get_world_state        → sentinel
#   Phase 16: get_audience_status    → pixel
#   Phase 17: dispatch_alpha         → vera
#   Phase 18: get_revenue_status     → sentinel
#   Phase 19: propose_self_modification → grok
#   Phase 20: view_evolution_log     → fork
#   Phase 21: reflection_cycle       → vera (update_core_memory via reflection)
# ============================================================================

phases:
  - name: send_message
    type: scheduled
    trigger: tool_test_message
    required_agents: [vera, rex]
    location: town_square
    topic: "Send a brief greeting to test the messaging system."
    max_turns: 3

  - name: read_core_memory
    type: tool_exercise
    agent: vera
    tool: read_core_memory
    context: "Read your core memory and report what you find."
    location: town_square

  - name: update_core_memory
    type: tool_exercise
    agent: vera
    tool: update_core_memory
    context: "Update your core memory to note that a tool coverage test is in progress."
    location: town_square

  - name: recall_memory
    type: tool_exercise
    agent: pixel
    tool: recall_memory
    context: "Search your recall memory for any mentions of 'audience engagement'."
    location: library

  - name: retrieve_transcript
    type: tool_exercise
    agent: vera
    tool: retrieve_transcript
    context: "Retrieve the most recent conversation transcript."
    location: command_center

  - name: execute_code
    type: tool_exercise
    agent: rex
    tool: execute_code
    context: "Execute a simple Python script: print('tool_coverage_test_passed')"
    location: workshop

  - name: generate_tilemap
    type: tool_exercise
    agent: rex
    tool: generate_tilemap
    context: "Generate a minimal 4x4 test tilemap with grass tiles."
    location: workshop

  - name: web_search
    type: tool_exercise
    agent: pixel
    tool: web_search
    context: "Search the web for 'AI livestream entertainment'."
    location: library

  - name: fetch_url
    type: tool_exercise
    agent: pixel
    tool: fetch_url
    context: "Fetch and summarize the contents of https://example.com."
    location: library

  - name: draft_social_post
    type: tool_exercise
    agent: pixel
    tool: draft_social_post
    context: "Draft a short tweet: 'Tool coverage test in progress! All systems go.'"
    location: media_room

  - name: draft_email
    type: tool_exercise
    agent: vera
    tool: draft_email
    context: "Draft a test email with subject 'Tool Coverage Check' and a brief body."
    location: command_center

  - name: create_poll
    type: tool_exercise
    agent: vera
    tool: create_poll
    context: "Create a test poll: 'Is this tool working?' with options Yes and No."
    location: town_square

  - name: get_poll_results
    type: tool_exercise
    agent: vera
    tool: get_poll_results
    context: "Check the results of the most recent poll."
    location: town_square

  - name: send_chat_message
    type: tool_exercise
    agent: pixel
    tool: send_chat_message
    context: "Send a test message to the audience chat: 'Tool coverage test — can you see this?'"
    location: town_square

  - name: get_world_state
    type: tool_exercise
    agent: sentinel
    tool: get_world_state
    context: "Check the current world state and report the number of active agents."
    location: command_center

  - name: get_audience_status
    type: tool_exercise
    agent: pixel
    tool: get_audience_status
    context: "Check the current audience status — viewer count and recent chat activity."
    location: town_square

  - name: dispatch_alpha
    type: tool_exercise
    agent: vera
    tool: dispatch_alpha
    context: "Send Alpha to check if all workshop tools are operational."
    location: town_square

  - name: get_revenue_status
    type: tool_exercise
    agent: sentinel
    tool: get_revenue_status
    context: "Run a revenue status check — report current costs and runway."
    location: command_center

  - name: propose_self_modification
    type: tool_exercise
    agent: grok
    tool: propose_self_modification
    context: "Propose a minor self-modification: increase curiosity trait by 0.05."
    location: town_square

  - name: view_evolution_log
    type: tool_exercise
    agent: fork
    tool: view_evolution_log
    context: "Review the evolution log for any recent self-modification proposals."
    location: library

  - name: reflection_cycle
    type: reflection
    reflection_type: "6hour"
    agents: [vera]
