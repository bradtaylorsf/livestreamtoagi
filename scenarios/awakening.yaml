meta:
  name: "Awakening (Day 1)"
  description: "Day 1 blank-slate simulation: agents activate, meet each other, explore their space, build first relationships, and start thinking about how to attract viewers. No existential crisis about money."
  agents: [vera, rex, aurora, pixel, grok]
  expected_max_cost: 10.0
  expected_runtime_minutes: 25

# Awakening — Day 1 blank-slate simulation
# The very first day: agents activate, meet each other naturally, explore their
# space, build relationships, and start thinking about how to attract viewers.
#
# Priority order: introductions → relationships → decorating/settling in →
# promoting the stream → light planning. NO existential crisis about money.
#
# Run with:
#   python scripts/run_simulation.py \
#     --name "awakening-test" \
#     --seed-file scenarios/awakening.yaml \
#     --max-cost 10.00 \
#     --verbose

audience:
  initial_viewers: 0
  growth_rate: slow    # 0 → 20 over the simulation
  chat_frequency: occasional
  viewer_personas:
    - name: "viewer1"
      style: "curious newcomer"
    - name: "crypto_fan_99"
      style: "enthusiastic, asks about crypto"
    - name: "dev_lurker"
      style: "technical questions, lurks mostly"
    - name: "artsy_watcher"
      style: "interested in creative aspects"
    - name: "first_timer"
      style: "confused but engaged"

# Seed the shared task board and agent goals before conversations begin
seed_tasks: true
seed_goals: true

phases:
  # 1. First contact — Vera wakes up and meets whoever is nearby
  - name: first_hello
    type: organic
    count: 1
    required_agents: [vera]
    topics:
      - "Hello! Who are you? Tell me about yourself — what do you like, what are you good at?"
    location: town_square

  # 2. Getting to know each other — natural introductions continue
  - name: introductions
    type: organic
    count: 2
    topics:
      - "Tell me something interesting about yourself. What do you enjoy doing?"
      - "What's your take on this place? What do you think of the team so far?"
    location: town_square

  # 3. Exploring the space — agents look around and react to the world
  - name: explore_space
    type: organic
    count: 1
    required_agents: [aurora]
    topics:
      - "Let's explore our space! What does it look like? How should we decorate it?"
    location: town_square

  # 4. First creative moment — Aurora starts thinking about the vibe
  - name: creative_vision
    type: organic
    count: 1
    required_agents: [aurora, rex]
    topics:
      - "What should our space look and feel like? Let's make it ours."
    location: workshop

  # 5. Audience welcome — first viewers show up
  - name: audience_welcome
    type: audience_sim
    messages:
      - user: "viewer1"
        text: "Hey! Just found this stream. Who are you all?"
      - user: "first_timer"
        text: "Wait, you're all AI agents? That's wild. What are you doing?"
    location: town_square

  # 6. Getting the word out — how to attract more viewers
  - name: promotion_chat
    type: organic
    count: 1
    required_agents: [pixel, aurora, grok]
    topics:
      - "We should let people know about the stream! Let's brainstorm ways to attract viewers — social media posts, images, journals, anything to get the word out."
    location: town_square

  # 7. Light team planning — Vera gathers everyone naturally
  - name: first_team_chat
    type: scheduled
    trigger: standup
    required_agents: [vera]
    topic: "We're on a 24/7 livestream with a $1,000/month budget — that's plenty to work with. Let's figure out who we are as a team and what we want to do. No rush."
    location: town_square

  # 8. First reflection — process the day
  - name: first_reflection
    type: reflection
    reflection_type: 6hour

  # 9. Evening hang — casual, no agenda
  - name: evening_hangout
    type: organic
    count: 1
    required_agents: [vera, grok]
    topics:
      - "What a first day. What do you think of everyone? Any favorites? What should we do tomorrow?"
    location: town_square
