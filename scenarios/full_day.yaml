# Full-day simulation seed file — all 15 phases
# Run with: python scripts/run_simulation.py --name "full-day" --seed-file scenarios/full_day.yaml

phases:
  # 1. Morning Standup — Vera kicks off, all agents participate
  - name: morning_standup
    type: scheduled
    trigger: standup
    required_agents: [vera]
    location: town_square

  # 2. Post-standup organic chat — 1-2 idle-triggered conversations
  - name: post_standup_chat
    type: organic
    count: 2
    topics:
      - "What should we work on today?"
      - "Did anyone see anything interesting overnight?"
    location: town_square

  # 3. Challenge assignment — Seed a coding challenge
  - name: coding_challenge
    type: challenge
    challenge:
      title: "Build a Hello World API"
      description: "Write a simple REST API that returns 'Hello, World!'"
      assigned_to: rex
      language: python
    location: workshop

  # 4. Code execution — Agent writes and executes code
  - name: code_execution
    type: tool_exercise
    agent: rex
    tool: execute_code
    context: "Write a Python function that generates the Fibonacci sequence up to n=10 and execute it"
    location: workshop

  # 5. Mid-day conversations — 2-3 organic conversations (mix of topics)
  - name: midday_conversations
    type: organic
    count: 3
    topics:
      - "How should we improve the show for viewers?"
      - "What new features could we add to our world?"
      - "Let's discuss our budget situation"
    location: town_square

  # 6. Creative session — Aurora proposes something, agents discuss
  - name: creative_session
    type: scheduled
    trigger: creative_brainstorm
    required_agents: [aurora]
    topic: "I have an idea for a new area in our pixel world"
    location: workshop

  # 7. Audience simulation — Inject fake chat messages, Pixel responds
  - name: audience_simulation
    type: audience_sim
    messages:
      - user: "SimViewer42"
        text: "What are you guys working on today?"
      - user: "PixelFan99"
        text: "Can you build a castle?"
    location: town_square

  # 8. Budget review — Sentinel delivers cost update
  - name: budget_review
    type: tool_exercise
    agent: sentinel
    tool: get_revenue_status
    context: "Check our current budget status and report to the team how much we've spent today"
    location: town_square

  # 9. Grok wildcard moment — Grok gets a solo conversation or hot take
  - name: grok_wildcard
    type: scheduled
    trigger: wildcard_moment
    required_agents: [grok]
    topic: "I just had the most unhinged idea and I need to tell everyone"
    location: town_square

  # 10. Alpha dispatch — An agent dispatches Alpha for a task
  - name: alpha_dispatch
    type: tool_exercise
    agent: vera
    tool: dispatch_alpha
    context: "Send Alpha to check on the status of the workshop area and report back"
    location: town_square

  # 11. Social/email drafting — Agent drafts a social post
  - name: social_drafting
    type: tool_exercise
    agent: pixel
    tool: draft_social_post
    context: "Write a tweet about today's progress on the show"
    location: town_square

  # 12. Web search session — Agent searches for trending topic
  - name: web_search
    type: tool_exercise
    agent: pixel
    tool: web_search
    context: "Search for trending AI topics that our audience might find interesting"
    location: town_square

  # 13. 6-hour reflection cycle — Memory compaction + reflection
  - name: reflection_cycle
    type: reflection
    reflection_type: 6hour

  # 14. Evening wind-down — Organic conversation
  - name: evening_winddown
    type: organic
    count: 1
    topics:
      - "What a day. What was everyone's favorite moment?"
    location: town_square

  # 15. End-of-day journal entries — All agents write journal entries
  - name: end_of_day_journals
    type: reflection
    reflection_type: 6hour
