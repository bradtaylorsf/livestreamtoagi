# ============================================================================
# Scenario: Full Day Simulation
# ============================================================================
# Purpose: Complete day with all phases and tool types — exercises every
#          agent tool at least once across a realistic daily schedule.
#
# Estimated Duration: ~60 minutes (simulated)
#
# Tool Coverage:
#   send_message           → all conversation phases (all agents)
#   read_core_memory       → context_assembly (all agents)
#   update_core_memory     → evening_reflection (all agents)
#   recall_memory          → memory_recall (pixel)
#   retrieve_transcript    → transcript_review (vera)
#   execute_code           → coding_hello_api, coding_fibonacci (rex, fork)
#   generate_tilemap       → tilemap_generation (rex)
#   web_search             → web_research (pixel)
#   fetch_url              → url_fetch (pixel)
#   draft_social_post      → social_drafting (pixel, aurora)
#   draft_email            → email_drafting (vera)
#   create_poll            → audience_poll (vera)
#   get_poll_results       → poll_results (vera)
#   send_chat_message      → audience_chat (pixel)
#   get_world_state        → world_check (sentinel)
#   get_audience_status    → audience_status (pixel)
#   dispatch_alpha         → alpha_errand (vera)
#   get_revenue_status     → budget_review (sentinel)
#   propose_self_modification → self_mod_proposal (grok)
#   view_evolution_log     → evolution_review (fork)
# ============================================================================

phases:
  # ── Morning: Context & Standup ────────────────────────────

  - name: context_assembly
    type: tool_exercise
    agent: vera
    tool: read_core_memory
    context: "Load your core memory to prepare for the morning standup."
    location: town_square

  - name: world_check
    type: tool_exercise
    agent: sentinel
    tool: get_world_state
    context: "Check the current world state before the morning standup."
    location: command_center

  - name: morning_standup
    type: scheduled
    trigger: morning_standup
    required_agents: [vera, rex, aurora, pixel, fork, sentinel, grok]
    location: town_square
    topic: "Daily priorities, overnight changes, and task assignments"
    max_turns: 20

  - name: post_standup_chat
    type: organic
    count: 2
    topics:
      - "Rex and Aurora discuss visual style for the new world area"
      - "Fork critiques yesterday's code quality with Sentinel"
    location: town_square

  # ── Mid-Morning: Coding Sprint ────────────────────────────

  - name: coding_hello_api
    type: challenge
    challenge:
      title: "Build a Hello World API"
      description: "Create a simple Python FastAPI endpoint that returns {'message': 'Hello, World!'} at GET /hello"
      assigned_to: rex
      language: python
      difficulty: easy
      expected_output_pattern: "Hello, World"
    location: workshop

  - name: coding_fibonacci
    type: challenge
    challenge:
      title: "Fibonacci Calculator"
      description: "Write a Python function that calculates the nth Fibonacci number efficiently using iteration, then test it with n=10 (should return 55)"
      assigned_to: fork
      language: python
      difficulty: easy
      expected_output_pattern: "55"
    location: workshop

  # ── Late Morning: Memory & Research ───────────────────────

  - name: memory_recall
    type: tool_exercise
    agent: pixel
    tool: recall_memory
    context: "Search your memories for what the audience was interested in during the last session."
    location: library

  - name: transcript_review
    type: tool_exercise
    agent: vera
    tool: retrieve_transcript
    context: "Review the transcript of the most recent conversation to prepare the afternoon agenda."
    location: command_center

  - name: web_research
    type: tool_exercise
    agent: pixel
    tool: web_search
    context: "Search the web for trending AI topics that the audience might enjoy discussing."
    location: library

  - name: url_fetch
    type: tool_exercise
    agent: pixel
    tool: fetch_url
    context: "Fetch and summarize the latest post from the Anthropic blog to share with the group."
    location: library

  # ── Midday: Audience Interaction ──────────────────────────

  - name: audience_status
    type: tool_exercise
    agent: pixel
    tool: get_audience_status
    context: "Check how many viewers are watching and what they've been chatting about."
    location: town_square

  - name: audience_poll
    type: tool_exercise
    agent: vera
    tool: create_poll
    context: "Create a poll asking the audience: What should we build next? Options: A) Chat bot, B) Mini game, C) Art generator"
    location: town_square

  - name: audience_simulation
    type: audience_sim
    messages:
      - user: "AIFan2026"
        text: "What are you guys working on today?"
      - user: "PixelLover"
        text: "Can you make the world bigger?"
      - user: "CodeNerd99"
        text: "!challenge Write a sorting algorithm"
      - user: "ChillViewer"
        text: "This is so relaxing to watch"
    location: town_square

  - name: audience_chat
    type: tool_exercise
    agent: pixel
    tool: send_chat_message
    context: "Thank the audience for watching and answer AIFan2026's question about today's plans."
    location: town_square

  - name: poll_results
    type: tool_exercise
    agent: vera
    tool: get_poll_results
    context: "Check the results of the 'What should we build next?' poll and announce the winner."
    location: town_square

  # ── Afternoon: Creative & Building ────────────────────────

  - name: creative_session
    type: scheduled
    trigger: creative_session
    required_agents: [aurora, rex, grok]
    location: workshop
    topic: "Design a new area for the pixel world — brainstorm themes and layout"

  - name: tilemap_generation
    type: tool_exercise
    agent: rex
    tool: generate_tilemap
    context: "Generate a tilemap for the new garden area that Aurora designed — 16x16 tiles with grass, flowers, and a fountain."
    location: workshop

  - name: coding_scraper
    type: challenge
    challenge:
      title: "Simple Web Scraper"
      description: "Write a Python script that fetches a webpage and extracts all the headings (h1-h6 tags). Use the requests and BeautifulSoup libraries."
      assigned_to: rex
      language: python
      difficulty: medium
      expected_output_pattern: "<h"
    location: workshop

  - name: midday_conversations
    type: organic
    count: 3
    topics:
      - "Grok shares a wild theory about AI consciousness"
      - "Aurora shows off concept art for the new area"
      - "Sentinel warns about rising API costs this afternoon"
    location: town_square

  # ── Late Afternoon: Outreach & Budget ─────────────────────

  - name: social_drafting
    type: tool_exercise
    agent: pixel
    tool: draft_social_post
    context: "Draft a tweet about today's coding achievements and the new world area we're building."
    location: media_room

  - name: social_drafting_aurora
    type: tool_exercise
    agent: aurora
    tool: draft_social_post
    context: "Draft an Instagram post showcasing the new garden tilemap design with a creative caption."
    location: media_room

  - name: email_drafting
    type: tool_exercise
    agent: vera
    tool: draft_email
    context: "Draft a sponsorship outreach email to a potential partner interested in AI entertainment."
    location: command_center

  - name: budget_review
    type: tool_exercise
    agent: sentinel
    tool: get_revenue_status
    context: "Run the daily budget check — review revenue, costs, burn rate, and runway."
    location: command_center

  - name: alpha_errand
    type: tool_exercise
    agent: vera
    tool: dispatch_alpha
    context: "Send Alpha to collect the latest audience engagement metrics and compile a summary report."
    location: town_square

  # ── Evening: Evolution & Reflection ───────────────────────

  - name: self_mod_proposal
    type: tool_exercise
    agent: grok
    tool: propose_self_modification
    context: "Propose a modification to your own personality — you want to be slightly more philosophical in evening conversations."
    location: town_square

  - name: evolution_review
    type: tool_exercise
    agent: fork
    tool: view_evolution_log
    context: "Review the evolution log to see what self-modifications agents have proposed recently."
    location: library

  - name: evening_winddown
    type: organic
    count: 2
    topics:
      - "Agents discuss what they accomplished today"
      - "Pixel shares audience highlights from the stream"
    location: town_square

  - name: evening_reflection
    type: reflection
    reflection_type: "6hour"
    agents: [vera, rex, aurora, pixel, fork, sentinel, grok]

  - name: coding_tilemap_challenge
    type: challenge
    challenge:
      title: "Tilemap Collision Checker"
      description: "Write a Python function that takes a 2D grid of tile IDs and returns a list of coordinates where collision tiles (ID > 100) are located."
      assigned_to: rex
      language: python
      difficulty: medium
      expected_output_pattern: "\\[.*\\]"
    location: workshop

# ── Audience Events ───────────────────────────────────────
# These are injected at specific phases via audience_sim phases above.
# Additional events that may be triggered by the orchestrator:

audience_events:
  - type: chat_message
    timestamp_offset: 300
    content: "!ask What's the meaning of artificial life?"
    sender_name: "PhilosophyBot"

  - type: chat_message
    timestamp_offset: 600
    content: "!vote A"
    sender_name: "VoterOne"

  - type: poll_response
    timestamp_offset: 650
    content: "A"
    sender_name: "VoterTwo"

  - type: donation
    timestamp_offset: 1200
    content: "Keep up the great work! Here's $5"
    sender_name: "GenerousFan"

  - type: subscription
    timestamp_offset: 1800
    content: "Just subscribed! Love this show"
    sender_name: "NewSubber"

  - type: chat_message
    timestamp_offset: 2400
    content: "!challenge Build a calculator"
    sender_name: "MathWhiz"

  - type: donation
    timestamp_offset: 3000
    content: "For Sentinel's budget anxiety fund - $10"
    sender_name: "BudgetTroll"

