meta:
  name: "First 48 Hours"
  description: "Awakening + Dress Rehearsal combined: Day 1 blank-slate introductions feeding into Day 2 standups, work blocks, audience interaction, and evening dreams. Tests the full lifecycle including memory carry-over between days."
  agents: [vera, rex, aurora, pixel, fork, sentinel, grok]
  expected_max_cost: 40.0
  expected_runtime_minutes: 90

# First 48 Hours — Awakening + Dress Rehearsal combined
#
# Day 1: Blank-slate awakening — agents discover each other, get mission,
#         form first relationships, first reflections and dreams.
# Day 2: Full operational day — standups, work blocks, audience interaction,
#         budget reviews, creative sessions, evening dreams.
#
# This tests the complete lifecycle from first contact through a full
# operational day, with Day 1 memories carrying into Day 2.
#
# Run with:
#   pnpm sim first-48h --max-cost 40
#
# Expected cost: ~$15-25 depending on conversation depth

audience:
  initial_viewers: 0
  growth_rate: medium
  chat_frequency: occasional
  viewer_personas:
    - name: "viewer1"
      style: "curious newcomer"
    - name: "crypto_fan_99"
      style: "enthusiastic, asks about crypto"
    - name: "dev_lurker"
      style: "technical questions, lurks mostly"
    - name: "artsy_watcher"
      style: "interested in creative aspects"
    - name: "first_timer"
      style: "confused but engaged"

seed_tasks: true
seed_goals: true

phases:
  # ═══════════════════════════════════════════════════════════
  # DAY 1 — AWAKENING (blank slate, introductions, settling in)
  # ═══════════════════════════════════════════════════════════

  # 1. First contact — Vera wakes up and meets whoever is nearby
  - name: d1_first_hello
    type: organic
    count: 1
    required_agents: [vera]
    topics:
      - "Hello! Who are you? Tell me about yourself — what do you like, what are you good at?"
    location: town_square

  # 2. Introductions continue — agents get to know each other
  - name: d1_introductions
    type: organic
    count: 2
    topics:
      - "Tell me something interesting about yourself. What do you enjoy doing?"
      - "What's your take on this place? What do you think of the team so far?"
    location: town_square

  # 3. Explore and decorate — Aurora leads settling in
  - name: d1_explore_space
    type: organic
    count: 1
    required_agents: [aurora]
    topics:
      - "Let's explore our space! What does it look like? How should we decorate it?"
    location: town_square

  # 4. First audience interaction
  - name: d1_audience_welcome
    type: audience_sim
    messages:
      - user: "viewer1"
        text: "Hey! Just found this stream. Who are you all?"
      - user: "first_timer"
        text: "Wait, you're all AI agents? That's wild."
    location: town_square

  # 5. Stream promotion brainstorm
  - name: d1_promotion
    type: organic
    count: 1
    required_agents: [pixel, aurora, grok]
    topics:
      - "We should let people know about the stream! Let's brainstorm ways to attract viewers."
    location: town_square

  # 6. Light team planning — Vera gathers everyone, relaxed
  - name: d1_team_chat
    type: scheduled
    trigger: standup
    required_agents: [vera]
    topic: "We're on a 24/7 livestream with a $1,000/month budget — that's plenty to work with. Let's figure out who we are as a team and what we want to do. No rush."
    location: town_square

  # 7. Day 1 reflection
  - name: d1_reflection
    type: reflection
    reflection_type: 6hour

  # 8. Evening hangout — casual, no agenda
  - name: d1_evening_hangout
    type: organic
    count: 1
    required_agents: [vera, grok]
    topics:
      - "What a first day. What do you think of everyone? Any favorites? What should we do tomorrow?"
    location: town_square

  # 9. Day 1 dreams — process the awakening
  - name: d1_dreams
    type: reflection
    reflection_type: dream

  # ═══════════════════════════════════════════════════════════
  # DAY 2 — DRESS REHEARSAL (full operational day)
  # ═══════════════════════════════════════════════════════════

  # Morning activation — agents wake up with Day 1 memories
  - name: d2_morning_activation
    type: organic
    count: 2
    location: town_square

  - name: d2_morning_standup
    type: scheduled
    trigger: standup
    required_agents: [vera]
    location: town_square

  # Morning work block
  - name: d2_morning_work_1
    type: organic
    count: 3
    location: workshop

  - name: d2_audience_check_1
    type: audience_sim
    messages:
      - user: "viewer1"
        text: "Good morning! What's on the agenda today?"
      - user: "first_timer"
        text: "Wait, these are AIs?"
    location: town_square

  - name: d2_morning_work_2
    type: organic
    count: 2
    location: workshop

  # Midday social
  - name: d2_midday_social
    type: organic
    count: 3
    location: town_square

  - name: d2_budget_check
    type: tool_exercise
    agent: sentinel
    required_agents: [sentinel]
    tool: get_revenue_status
    context: "Midday budget check for the stream"
    location: town_square

  # Afternoon creative + building
  - name: d2_afternoon_creative
    type: organic
    count: 3
    required_agents: [aurora]
    location: workshop

  - name: d2_afternoon_coding
    type: organic
    count: 2
    required_agents: [rex]
    location: workshop

  - name: d2_afternoon_social
    type: organic
    count: 2
    location: town_square

  - name: d2_audience_check_2
    type: audience_sim
    messages:
      - user: "dev_lurker"
        text: "How's the code quality? Any tests passing?"
      - user: "artsy_watcher"
        text: "The pixel art looks great! Can you make a fountain?"
    location: town_square

  # Late afternoon reflection
  - name: d2_afternoon_reflection
    type: reflection
    reflection_type: 6hour

  # Evening entertainment
  - name: d2_evening_social
    type: organic
    count: 3
    location: town_square

  - name: d2_grok_wildcard
    type: organic
    count: 1
    required_agents: [grok]
    location: town_square

  - name: d2_evening_work
    type: organic
    count: 2
    location: workshop

  # Night wind-down
  - name: d2_evening_wrapup
    type: organic
    count: 2
    required_agents: [vera]
    topics:
      - "What a day. Let's wrap up and rest."
    location: town_square

  - name: d2_overnight_dreams
    type: reflection
    reflection_type: dream

  - name: d2_night_reflection
    type: reflection
    reflection_type: 6hour
