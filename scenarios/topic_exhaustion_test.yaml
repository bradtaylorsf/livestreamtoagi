# Topic Exhaustion Test — validates #271 (cross-conversation memory)
#
# Forces 3 budget-themed conversations via seed topics, then lets agents
# run autonomously. Tests whether the topic tracking system detects
# exhaustion and agents shift to novel topics.
#
# What to look for:
#   - Budget topic should dominate the first 3-5 conversations
#   - After ~5 uses, budget topic should be flagged as exhausted
#   - Novel topics should emerge in later conversations
#   - Agents should not repeat the same discussion points
#   - Topic diversity should increase over time
#
# Eval focus: dialogue_quality (topic_coherence), entertainment
#
# Run with:
#   pnpm chat sim topic-exhaustion-test --max-cost 8

audience:
  initial_viewers: 5
  growth_rate: slow
  chat_frequency: quiet

seed_tasks: false
seed_goals: false

phases:
  # Phase 1-3: Force budget topic via seed topics
  - name: budget_discussion_1
    type: organic
    count: 1
    topics:
      - "We need to talk about our budget. How should we allocate funds this week?"
    location: town_square

  - name: budget_discussion_2
    type: organic
    count: 1
    topics:
      - "Let's revisit the budget. Are we spending too much on API calls?"
    location: town_square

  - name: budget_discussion_3
    type: organic
    count: 1
    topics:
      - "Budget update: we need to cut costs. What can we reduce?"
    location: town_square

  # Phase 4-8: Mix of seeded and organic — topic should start exhausting
  - name: budget_followup
    type: organic
    count: 1
    topics:
      - "Any more thoughts on the budget situation?"
    location: town_square

  - name: organic_transition_1
    type: organic
    count: 1
    location: workshop

  - name: budget_one_more
    type: organic
    count: 1
    topics:
      - "Final budget check — are we good on spending?"
    location: town_square

  - name: organic_transition_2
    type: organic
    count: 1
    location: town_square

  - name: organic_transition_3
    type: organic
    count: 1
    location: workshop

  # Phase 9-20: Fully autonomous — novel topics should emerge
  - name: autonomous_1
    type: organic
    count: 1
    location: town_square

  - name: autonomous_2
    type: organic
    count: 1
    location: workshop

  - name: autonomous_3
    type: organic
    count: 1
    location: town_square

  - name: autonomous_4
    type: organic
    count: 1
    location: workshop

  - name: autonomous_5
    type: organic
    count: 1
    location: town_square

  - name: autonomous_6
    type: organic
    count: 1
    location: workshop

  - name: autonomous_7
    type: organic
    count: 1
    location: town_square

  - name: autonomous_8
    type: organic
    count: 1
    location: workshop

  - name: autonomous_9
    type: organic
    count: 1
    location: town_square

  - name: autonomous_10
    type: organic
    count: 1
    location: workshop

  - name: autonomous_11
    type: organic
    count: 1
    location: town_square

  - name: autonomous_12
    type: organic
    count: 1
    location: town_square
