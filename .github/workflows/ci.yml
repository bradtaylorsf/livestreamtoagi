name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Ruff check
        run: ruff check core/ tools/
      - name: Ruff format check
        run: ruff format --check core/ tools/
      - name: Mypy check
        run: mypy core/ tools/

  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run backend tests
        run: pytest tests/backend/ -v -m "not integration" --cov=core --cov=tools

  memory-regression:
    name: Memory Regression Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-memory-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-memory-
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run memory regression gate
        run: >
          pytest
          tests/backend/test_core_memory.py
          tests/backend/test_core_memory_startup.py
          tests/backend/test_recall_memory.py
          tests/backend/test_archival_memory.py
          tests/backend/test_cross_conversation_memory.py
          tests/backend/test_memory_seed.py
          tests/backend/test_memory_seed_bridge_compat.py
          tests/backend/test_memory_snapshot.py
          tests/backend/test_memory_tools.py
          tests/backend/test_memory_backend.py
          tests/backend/test_memory_parity.py
          tests/backend/test_bridge_memory.py
          tests/backend/test_bridge_perception_action_memory.py
          -v
          -m "not integration"

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests
        run: cd frontend && npm test

  website-test:
    name: Website Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        run: cd website && npm ci
      - name: Run tests
        run: cd website && npm test
      - name: Build verification
        run: cd website && npm run build

  render-test:
    name: Render Pipeline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-render-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-render-
      - name: Install dependencies
        run: uv pip install --system -e ".[dev,render]"
      - name: Resolve playwright version
        id: pw
        run: echo "version=$(python -c 'import importlib.metadata; print(importlib.metadata.version(\"playwright\"))')" >> "$GITHUB_OUTPUT"
      - name: Cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      - name: Install chromium
        run: python -m playwright install --with-deps chromium
      - name: Run render tests
        run: pytest tests/backend/test_video_render.py -v

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Start services
        run: docker compose up -d
      - name: Wait for services
        run: bash scripts/check-services.sh || (docker compose logs && exit 1)
      - name: Run integration tests
        run: pytest tests/integration/ -v
      - name: Stop services
        if: always()
        run: docker compose down
