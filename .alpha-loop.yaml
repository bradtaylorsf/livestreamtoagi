# Alpha Loop configuration — Livestream to AGI
# ----------------------------------------------------------------------------
# Stack: Python 3.13 backend (FastAPI + CrewAI) + TypeScript frontend/website,
# orchestrated via pnpm scripts over a docker compose stack (Redis/PG/Langfuse).
# Docs: https://github.com/bradtaylorsf/alpha-loop#configuration
#
# This is a HYBRID multi-harness setup: Claude (Opus) drives the judgment- and
# tool-heavy stages (plan / review / verify); Codex (gpt-5.5) drives the
# token-heavy execution stages (implement / test_fix / learn). See the
# `pipeline:` section near the bottom for the per-stage routing.
# ----------------------------------------------------------------------------

# === Project ================================================================
# Identifies the GitHub repo + project board the loop reads from.
repo: bradtaylorsf/livestreamtoagi
project: 5                    # GitHub Project number (from project URL: /projects/N)
# milestone: ""               # Only process issues in this milestone (empty = all)

# === Agent ==================================================================
# Top-level default agent. Used for any operation NOT explicitly overridden in
# `pipeline:` below — batch plan/implement, post-session holistic review, and
# eval judging. Per-stage overrides in `pipeline:` win for the main loop steps.
#   claude   - Anthropic Claude Code (best tool-use support)
#   codex    - OpenAI Codex CLI
#   opencode / lmstudio / ollama - see docs/local-models.md
agent: claude
# model: ""                   # Top-level model (omit -> Claude Code default).
                              # Per-stage models are set in `pipeline:` below.
review_model: opus            # Model for post-session code review + learning
                              # extraction (judgment-heavy -> max quality).
agent_timeout: 7200           # Per-issue agent timeout (2h). Heavy stack
                              # (docker + venv + dual npm) -> generous net.

# === Workflow ===============================================================
base_branch: main
label: ready                  # Issues with this label are queued for the loop
auto_merge: true              # Auto-merge issue PRs into the session branch
# merge_to: ""                # Reuse an existing session branch instead of new
auto_cleanup: true            # Remove worktrees after each issue
# prefer_epics: false         # Auto-pick the single open epic instead of prompt

# === Commands (one distinct command per task) ===============================
# setup_command  — one-time bootstrap per fresh worktree (idempotent).
#                  E12 run-mode work is backend/Minecraft orchestration work,
#                  so do not reinstall frontend + website dependencies per
#                  batch.
setup_command: "/opt/homebrew/bin/uv venv --python 3.13 .venv && /opt/homebrew/bin/uv pip install --python .venv/bin/python -r requirements.txt"

# test_command   — the validation GATE run after every issue/batch (and as
#                  preflight against `main` before the session). E12 run-mode
#                  work is backend/Minecraft orchestration work, so keep the
#                  per-batch gate backend-only and defer frontend/website and
#                  full Minecraft simulation validation until post-#775 epic
#                  validation.
test_command: make test-backend

# dev_command    — boots the full stack (docker + backend + frontend + website)
#                  so the `verify` stage / Playwright has a live target.
dev_command: pnpm dev

# smoke_test     — Disabled for E12 per-batch runs. The integrated Minecraft
#                  smoke belongs after #775, when the run-spec, starting
#                  conditions, supervisor, policy, blackboard, rescue loop, and
#                  plan-build settlement scenario all exist together.
# smoke_test: ""

# === Testing toggles ========================================================
max_test_retries: 3           # Times the agent may retry failing tests
skip_preflight: false         # Run test_command against main before starting
# skip_tests: false           # Never skip the gate (not recommended)
# skip_review: false          # Keep the Claude review stage
skip_verify: true             # Defer live/full Minecraft verification until #775
# skip_learn: false           # Keep learning extraction
# skip_e2e: false             # Keep Playwright/E2E
# skip_install: false         # Keep auto-running setup_command on new worktrees

# === Safety limits (0 = unlimited) ==========================================
# Posture: E12 run-mode epic uses small batches to reduce per-issue ceremony
# while keeping review scope small enough to understand.
max_issues: 60                # Cap per session (well above current backlog)
max_session_duration: 0       # Unlimited — exits when the queue drains
poll_interval: 60             # Seconds between queue polls when running long

# === Harnesses ==============================================================
# Sync skills/agents to BOTH harnesses since the pipeline routes across them.
# Claude syncs to .claude/ ; Codex syncs skills to .agents/ and agents to
# .codex/ (both directories already exist in this repo).
harnesses:
  - claude
  - codex

# === Pipeline (per-stage harness + model routing) ===========================
# All stages run on Claude. Judgment- and tool-heavy stages (review, verify)
# pin Opus; bulk-execution stages (implement, test_fix, learn) inherit the
# top-level model so Claude Code picks its default. Each step accepts
# { agent?, model? }; unset steps fall back to top-level.
pipeline:
  plan:                       # Architecture & task decomposition
    agent: claude
  implement:                  # Bulk code generation
    agent: claude
  test_fix:                   # Mechanical iteration on failing tests
    agent: claude
  review:                     # Catch subtle correctness / security issues
    agent: claude
    model: opus
  verify:                     # Live verification across the docker/multi-svc/
    agent: claude             # Phaser stack — Claude has the best tool-use
    model: opus
  learn:                      # Learning extraction (cheap summarization)
    agent: claude

# === Batch mode =============================================================
batch: true
batch_size: 2

# === Post-session review ====================================================
# Holistic review + security scan of the full session diff (uses `review_model`
# / top-level `agent` = Claude). Defaults are true; listed here for visibility.
post_session:
  review: true
  security_scan: true

# === Evaluation =============================================================
auto_capture: true            # Capture session failures as eval cases
eval_dir: .alpha-loop/evals
# eval_model: ""              # Defaults to review_model
# eval_timeout: 300
# eval:
#   include_agent_prompts: true
#   include_skills: true

# === Pricing (cost tracking) ================================================
# Opus is built-in but pinned here for clarity. gpt-5.5 is NOT in the built-in
# table — values below are PLACEHOLDER estimates; update with real per-Mtok
# numbers once known so `alpha-loop` cost reports are accurate.
# pricing:
#   claude-opus-4-7: { input: 15.0, output: 75.0 }
#   opus:            { input: 15.0, output: 75.0 }
#   gpt-5.5:         { input: 0,    output: 0 }   # TODO: set real pricing

